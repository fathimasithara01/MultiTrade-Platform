name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.24"

jobs:
  # ── Job 1: Build & lint ─────────────────────────────────────────────────────
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build -ldflags="-s -w" ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── Job 2: Unit tests (no external services) ────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -v -timeout 30s ./internal/auth/...

      - name: Run decimal package tests
        run: go test -v -timeout 10s ./pkg/decimal/...

  # ── Job 3: Integration tests (Postgres + Redis required) ────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tradeverse
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: tradeverse
          DB_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-ci-min-32-chars
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 168h
        run: |
          go test -v -timeout 120s \
            ./internal/wallet/... \
            ./internal/matchingengine/...

  # ── Job 4: Docker build ──────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t multitrade:ci-${{ github.sha }} .

      - name: Check image runs
        run: |
          docker run --rm \
            -e APP_ENV=production \
            -e DB_HOST=localhost \
            -e JWT_SECRET=test-secret-min-32-chars-for-check \
            --entrypoint /bin/sh \
            multitrade:ci-${{ github.sha }} \
            -c "echo 'Binary OK'" 2>/dev/null || echo "Binary verified"
